<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no
    "
  />

  <title>Current Time</title>

  <link
    rel="manifest"
    href="manifest.json"
  />

  <meta
    name="theme-color"
    content="#000000"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <style>

    body {

      margin: 0;

      width: 100vw;
      height: 100vh;

      background: #000;
      color: #fff;

      font-family:
        "Noto Sans JP",
        sans-serif;

      overflow: hidden;

      user-select: none;
      -webkit-user-select: none;

      touch-action: manipulation;
      overscroll-behavior: none;

      display: flex;
      flex-direction: column;
    }

    #captureArea {

      width: 100%;

      min-height: 100%;

      display: flex;
      flex-direction: column;

      overflow: visible;

      padding-bottom: 4px;

      box-sizing: border-box;
    }

    #topArea {

      position: relative;

      width: 100%;

      height: 36px;

      margin-top: 6px;
    }

    #dateText {

      position: absolute;

      left: 16px;
      top: 50%;

      transform: translateY(-50%);

      font-size: 0.95rem;

      white-space: nowrap;
    }

    #topText {

      position: absolute;

      left: 50%;
      top: 50%;

      transform:
        translate(-50%, -50%);

      font-size: 1.45rem;

      text-align: center;

      white-space: nowrap;

      cursor: pointer;
    }

    #weatherInput {

      position: absolute;

      right: 16px;
      top: 50%;

      transform: translateY(-50%);

      width: 60px;

      background: transparent;

      color: white;

      border: none;

      border-bottom:
        1px solid #666;

      text-align: right;

      outline: none;

      font-size: 0.95rem;

      display: none;
    }

    #subArea {

      position: relative;

      width: 100%;

      height: 22px;

      margin-top: -1px;
    }

    #teamName {

      position: absolute;

      left: 50%;
      top: 50%;

      transform:
        translate(-50%, -50%);

      font-size: 1rem;

      cursor: pointer;

      opacity: 0.9;

      display: none;

      white-space: nowrap;
    }

    #middleM {

      position: absolute;

      right: 25px;
      top: 50%;

      transform: translateY(-50%);

      font-size: 1rem;

      font-style: italic;

      opacity: 0;

      transition: opacity 0.2s;

      line-height: 1;

      display: none;
    }

    #history {

      flex: 1;

      overflow-y: auto;

      padding-left: 20px;
      padding-right: 20px;

      box-sizing: border-box;

      padding-bottom: 2px;
    }

    .historyRow {

      width: 100%;

      display: flex;

      align-items: center;

      justify-content: space-between;

      margin-top: 2px;
    }

    .historyItem {

      font-size: 1.27rem;

      white-space: nowrap;

      cursor: pointer;

      line-height: 1.05;
    }

    .peopleCount {

      width: 42px;

      font-size: 0.9rem;

      background: transparent;

      color: white;

      border: none;

      border-bottom:
        1px solid #666;

      text-align: center;

      outline: none;

      padding: 0;
    }

    #bottomArea {

      width: 100%;

      flex-shrink: 0;

      padding-top: 0px;

      padding-bottom: 0px;

      margin-top: -2px;
    }

    #memoArea {

      width: calc(100% - 40px);

      min-height: 90px;

      margin:
        0
        20px
        4px
        20px;

      background: #111;

      color: white;

      border: 1px solid #333;

      border-radius: 8px;

      resize: none;

      padding: 8px;

      box-sizing: border-box;

      font-size: 0.95rem;

      outline: none;

      overflow: hidden;

      white-space: pre-wrap;

      line-height: 1.4;
    }

    #saveImageButton {

      width: calc(100% - 40px);

      margin:
        0
        20px
        2px
        20px;

      padding: 8px;

      background: #222;

      color: white;

      border: 1px solid #444;

      border-radius: 8px;

      font-size: 1rem;

      box-sizing: border-box;
    }

    #inputArea,
    #teamInputArea,
    #timeEditArea,
    #confirmArea {

      position: fixed;

      top: 60%;
      left: 50%;

      transform: translate(-50%, -50%);

      display: flex;
      flex-direction: column;

      gap: 8px;

      width: 80%;
      max-width: 400px;

      background: #111;

      padding: 18px;

      border: 1px solid #444;

      box-sizing: border-box;

      z-index: 1000;
    }

    #confirmText {

      text-align: center;

      font-size: 1rem;
    }

    input {

      font-size: 1rem;

      padding: 8px;

      border: none;

      outline: none;
    }

    button {

      font-size: 1rem;

      padding: 8px;

      border: none;

      background: #444;

      color: #fff;
    }

    .buttonRow {

      display: flex;

      gap: 8px;
    }

    .buttonRow button {

      flex: 1;
    }

  </style>

</head>

<body>

  <div id="captureArea">

    <div id="topArea">

      <div id="dateText"></div>

      <div id="topText"></div>

      <input
        id="weatherInput"
        type="text"
        placeholder="天気"
      />

    </div>

    <div id="subArea">

      <div id="teamName">
        (コンビ名)
      </div>

      <div id="middleM">
        M
      </div>

    </div>

    <div id="history"></div>

    <div id="bottomArea">

      <textarea
        id="memoArea"
        placeholder="メモ"
      ></textarea>

      <button id="saveImageButton">
        写真
      </button>

    </div>

  </div>

  <div id="inputArea">

    <input
      id="textInput"
      type="text"
      placeholder="現場名を入力"
    />

    <button id="submitButton">
      決定
    </button>

  </div>

  <div
    id="teamInputArea"
    style="display:none;"
  >

    <input
      id="teamInput"
      type="text"
      placeholder="コンビ名"
    />

    <button id="teamSubmitButton">
      決定
    </button>

  </div>

  <div
    id="timeEditArea"
    style="display:none;"
  >

    <input
      id="timeEditInput"
      type="text"
    />

    <div class="buttonRow">

      <button id="timeEditButton">
        修正
      </button>

      <button id="deleteButton">
        削除
      </button>

    </div>

  </div>

  <div
    id="confirmArea"
    style="display:none;"
  >

    <div id="confirmText">
      本当に削除しますか？
    </div>

    <div class="buttonRow">

      <button id="confirmDeleteButton">
        消す
      </button>

      <button id="cancelDeleteButton">
        残す
      </button>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>

    const captureArea =
      document.getElementById(
        "captureArea"
      );

    const topText =
      document.getElementById(
        "topText"
      );

    const teamName =
      document.getElementById(
        "teamName"
      );

    const middleM =
      document.getElementById(
        "middleM"
      );

    const weatherInput =
      document.getElementById(
        "weatherInput"
      );

    const historyElement =
      document.getElementById(
        "history"
      );

    const dateText =
      document.getElementById(
        "dateText"
      );

    const inputArea =
      document.getElementById(
        "inputArea"
      );

    const textInput =
      document.getElementById(
        "textInput"
      );

    const submitButton =
      document.getElementById(
        "submitButton"
      );

    const teamInputArea =
      document.getElementById(
        "teamInputArea"
      );

    const teamInput =
      document.getElementById(
        "teamInput"
      );

    const teamSubmitButton =
      document.getElementById(
        "teamSubmitButton"
      );

    const saveImageButton =
      document.getElementById(
        "saveImageButton"
      );

    const memoArea =
      document.getElementById(
        "memoArea"
      );

    const timeEditArea =
      document.getElementById(
        "timeEditArea"
      );

    const timeEditInput =
      document.getElementById(
        "timeEditInput"
      );

    const timeEditButton =
      document.getElementById(
        "timeEditButton"
      );

    const deleteButton =
      document.getElementById(
        "deleteButton"
      );

    const confirmArea =
      document.getElementById(
        "confirmArea"
      );

    const confirmDeleteButton =
      document.getElementById(
        "confirmDeleteButton"
      );

    const cancelDeleteButton =
      document.getElementById(
        "cancelDeleteButton"
      );

    let initialized = false;

    let startTime = null;

    let historyCount = 0;

    let editingItem = null;

    let touchTimer = null;

    const TOUCH_DELAY = 20;

    const numbers = [

      "①","②","③","④","⑤",
      "⑥","⑦","⑧","⑨","⑩",

      "⑪","⑫","⑬","⑭","⑮",
      "⑯","⑰","⑱","⑲","⑳",

      "㉑","㉒","㉓","㉔","㉕",
      "㉖","㉗","㉘","㉙","㉚",

      "㉛","㉜","㉝","㉞","㉟",

      "㊱","㊲","㊳","㊴","㊵",

      "㊶","㊷","㊸","㊹","㊺",
      "㊻","㊼","㊽","㊾","㊿"
    ];

    function updateDate() {

      const now = new Date();

      const year =
        now.getFullYear();

      const month =
        String(
          now.getMonth() + 1
        ).padStart(2, "0");

      const day =
        String(
          now.getDate()
        ).padStart(2, "0");

      dateText.textContent =

        year
        + "/"
        + month
        + "/"
        + day;
    }

    updateDate();

    function autoResizeMemo() {

      memoArea.style.height =
        "auto";

      memoArea.style.height =
        memoArea.scrollHeight + "px";
    }

    memoArea.addEventListener(
      "input",
      autoResizeMemo
    );

    function getNumberText(index) {

      if (index < numbers.length) {

        return numbers[index];
      }

      return (index + 1) + ".";
    }

    function getCurrentTime() {

      const now = new Date();

      return (

        now
          .getHours()
          .toString()
          .padStart(2, "0")

        + ":"

        +

        now
          .getMinutes()
          .toString()
          .padStart(2, "0")

        + ":"

        +

        now
          .getSeconds()
          .toString()
          .padStart(2, "0")
      );
    }

    function updateAllNumbers() {

      const rows =
        document.querySelectorAll(
          ".historyRow"
        );

      rows.forEach(
        (row, index) => {

          const item =
            row.querySelector(
              ".historyItem"
            );

          item.textContent =

            getNumberText(index)

            +

            item.textContent.substring(1);
        }
      );

      historyCount =
        rows.length;
    }

    function enableMiddleM() {

      middleM.style.display =
        "block";

      middleM.style.opacity =
        "0.9";
    }

    function createHistoryRow(text) {

      const row =
        document.createElement(
          "div"
        );

      row.className =
        "historyRow";

      const item =
        document.createElement(
          "div"
        );

      item.className =
        "historyItem";

      item.textContent =
        text;

      item.addEventListener(
        "click",
        () => {

          editingItem = item;

          timeEditInput.value =
            item.textContent;

          timeEditArea.style.display =
            "flex";

          timeEditInput.focus();
        }
      );

      const people =
        document.createElement(
          "input"
        );

      people.className =
        "peopleCount";

      people.type = "number";

      people.placeholder = "人数";

      people.inputMode =
        "numeric";

      row.appendChild(item);

      row.appendChild(people);

      historyElement.appendChild(
        row
      );
    }

    function startTimeRecord() {

      if (!initialized) {
        return;
      }

      if (startTime !== null) {
        return;
      }

      startTime =
        getCurrentTime();

      historyCount++;

      const text =

        getNumberText(
          historyCount - 1
        )

        +

        startTime

        +

        "~";

      createHistoryRow(text);

      enableMiddleM();
    }

    function endTimeRecord() {

      if (!initialized) {
        return;
      }

      if (startTime === null) {
        return;
      }

      const items =
        document.querySelectorAll(
          ".historyItem"
        );

      const item =
        items[
          items.length - 1
        ];

      if (
        item &&
        item.textContent.endsWith("~")
      ) {

        item.textContent +=
          getCurrentTime();
      }

      startTime = null;
    }

    function openEditor() {

      inputArea.style.display =
        "flex";

      textInput.value =
        topText.textContent;

      textInput.focus();
    }

    function closeEditor() {

      const text =
        textInput.value.trim();

      if (text === "") {
        return;
      }

      topText.textContent =
        text;

      weatherInput.style.display =
        "block";

      teamName.style.display =
        "block";

      inputArea.style.display =
        "none";

      initialized = true;
    }

    function openTeamEditor() {

      teamInputArea.style.display =
        "flex";

      teamInput.value = "";

      teamInput.focus();
    }

    function closeTeamEditor() {

      const text =
        teamInput.value.trim();

      if (text !== "") {

        teamName.textContent =
          "(" + text + ")";
      }

      teamInputArea.style.display =
        "none";
    }

    function closeTimeEditor() {

      if (
        editingItem === null
      ) {
        return;
      }

      editingItem.textContent =

        editingItem.textContent.charAt(0)

        +

        timeEditInput.value.substring(1);

      timeEditArea.style.display =
        "none";

      editingItem = null;

      updateAllNumbers();
    }

    function openDeleteConfirm() {

      timeEditArea.style.display =
        "none";

      confirmArea.style.display =
        "flex";
    }

    function confirmDelete() {

      if (
        editingItem === null
      ) {
        return;
      }

      const row =
        editingItem.closest(
          ".historyRow"
        );

      if (row) {

        row.remove();
      }

      editingItem = null;

      confirmArea.style.display =
        "none";

      updateAllNumbers();

      if (
        historyElement.children
          .length === 0
      ) {

        middleM.style.opacity =
          "0";
      }
    }

    function cancelDelete() {

      confirmArea.style.display =
        "none";

      editingItem = null;
    }

    submitButton.addEventListener(
      "click",
      closeEditor
    );

    teamSubmitButton.addEventListener(
      "click",
      closeTeamEditor
    );

    teamName.addEventListener(
      "click",
      openTeamEditor
    );

    timeEditButton.addEventListener(
      "click",
      closeTimeEditor
    );

    deleteButton.addEventListener(
      "click",
      openDeleteConfirm
    );

    confirmDeleteButton.addEventListener(
      "click",
      confirmDelete
    );

    cancelDeleteButton.addEventListener(
      "click",
      cancelDelete
    );

    topText.addEventListener(
      "click",
      event => {

        event.stopPropagation();

        openEditor();
      }
    );

    saveImageButton.addEventListener(

      "click",

      async () => {

        saveImageButton.style.display =
          "none";

        historyElement.style.overflow =
          "visible";

        const canvas =
          await html2canvas(
            captureArea,
            {
              backgroundColor: "#000",

              width:
                captureArea.scrollWidth,

              height:
                captureArea.scrollHeight,

              windowWidth:
                captureArea.scrollWidth,

              windowHeight:
                captureArea.scrollHeight,

              scrollX: 0,
              scrollY: 0
            }
          );

        saveImageButton.style.display =
          "block";

        canvas.toBlob(

          async blob => {

            const file =
              new File(
                [blob],
                "record.png",
                {
                  type: "image/png"
                }
              );

            if (
              navigator.canShare &&
              navigator.canShare({
                files: [file]
              })
            ) {

              await navigator.share({

                files: [file],

                title: "record"
              });

              return;
            }

            const link =
              document.createElement(
                "a"
              );

            link.href =
              URL.createObjectURL(blob);

            link.download =
              "record.png";

            link.click();
          }
        );
      }
    );

    document.body.addEventListener(

      "touchstart",

      event => {

        clearTimeout(
          touchTimer
        );

        const touchCount =
          event.touches.length;

        touchTimer =
          setTimeout(() => {

            if (
              touchCount === 3
            ) {

              event.preventDefault();

              startTimeRecord();
            }

            if (
              touchCount === 4
            ) {

              event.preventDefault();

              endTimeRecord();
            }

          }, TOUCH_DELAY);
      },

      { passive: false }
    );

    document.body.addEventListener(

      "touchend",

      () => {

        clearTimeout(
          touchTimer
        );
      }
    );

    if ("serviceWorker" in navigator) {

      navigator
        .serviceWorker
        .register("./sw.js");
    }

  </script>

</body>
</html>
