<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Current Time</title>

  <link
    rel="manifest"
    href="manifest.json"
  />

  <meta
    name="theme-color"
    content="#000000"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <style>

    body {

      margin: 0;

      width: 100vw;
      height: 100vh;

      background: #000;
      color: #fff;

      font-family:
        "Noto Sans JP",
        sans-serif;

      overflow: hidden;

      user-select: none;
      -webkit-user-select: none;

      display: flex;
      flex-direction: column;

      align-items: center;
    }

    #topText {

      width: 100%;

      text-align: center;

      font-size: 2rem;

      padding-top: 30px;

      word-break: break-word;

      cursor: pointer;
    }

    #middleM {

      width: 100%;

      text-align: center;

      font-size: 1.6rem;

      font-style: italic;

      margin-top: -5px;
      margin-bottom: 15px;

      opacity: 0.9;

      pointer-events: none;
    }

    #history {

      width: 100%;

      flex: 1;

      overflow-y: auto;

      display: flex;
      flex-direction: column;

      align-items: flex-start;

      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 30px;

      box-sizing: border-box;
    }

    .historyItem {

      font-size: 1rem;

      margin-top: 10px;

      white-space: nowrap;

      cursor: pointer;
    }

    #inputArea,
    #timeEditArea {

      position: absolute;

      top: 60%;
      left: 50%;

      transform: translate(-50%, -50%);

      display: flex;
      flex-direction: column;

      gap: 10px;

      width: 80%;
      max-width: 400px;

      background: #111;

      padding: 20px;

      border: 1px solid #444;

      box-sizing: border-box;
    }

    input {

      font-size: 1.2rem;

      padding: 10px;

      border: none;

      outline: none;
    }

    button {

      font-size: 1.2rem;

      padding: 10px;

      border: none;

      background: #444;

      color: #fff;
    }

  </style>

</head>

<body>

  <div id="topText"></div>

  <div id="middleM">M</div>

  <div id="history"></div>

  <div id="inputArea">

    <input
      id="textInput"
      type="text"
      placeholder="文字を入力"
    />

    <button id="submitButton">
      決定
    </button>

  </div>

  <div
    id="timeEditArea"
    style="display:none;"
  >

    <input
      id="timeEditInput"
      type="text"
      placeholder="①12:34:56~12:40:00"
    />

    <button id="timeEditButton">
      修正
    </button>

  </div>

  <script>

    const topText =
      document.getElementById(
        "topText"
      );

    const historyElement =
      document.getElementById(
        "history"
      );

    const inputArea =
      document.getElementById(
        "inputArea"
      );

    const textInput =
      document.getElementById(
        "textInput"
      );

    const submitButton =
      document.getElementById(
        "submitButton"
      );

    const timeEditArea =
      document.getElementById(
        "timeEditArea"
      );

    const timeEditInput =
      document.getElementById(
        "timeEditInput"
      );

    const timeEditButton =
      document.getElementById(
        "timeEditButton"
      );

    let initialized = false;

    let startTime = null;

    let historyCount = 0;

    let editingItem = null;

    const numbers = [

      "①","②","③","④","⑤",
      "⑥","⑦","⑧","⑨","⑩",

      "⑪","⑫","⑬","⑭","⑮",
      "⑯","⑰","⑱","⑲","⑳",

      "㉑","㉒","㉓","㉔","㉕",
      "㉖","㉗","㉘","㉙","㉚",

      "㉛","㉜","㉝","㉞","㉟",

      "㊱","㊲","㊳","㊴","㊵",

      "㊶","㊷","㊸","㊹","㊺",
      "㊻","㊼","㊽","㊾","㊿"
    ];

    function getCurrentTime() {

      const now = new Date();

      return (

        now
          .getHours()
          .toString()
          .padStart(2, "0")

        + ":"

        +

        now
          .getMinutes()
          .toString()
          .padStart(2, "0")

        + ":"

        +

        now
          .getSeconds()
          .toString()
          .padStart(2, "0")
      );
    }

    function startTimeRecord() {

      if (!initialized) {
        return;
      }

      if (startTime !== null) {
        return;
      }

      startTime =
        getCurrentTime();

      historyCount++;

      const item =
        document.createElement(
          "div"
        );

      item.className =
        "historyItem";

      let numberText = "";

      if (
        historyCount <=
        numbers.length
      ) {

        numberText =
          numbers[
            historyCount - 1
          ];

      } else {

        numberText =
          historyCount + ".";
      }

      item.textContent =

        numberText +
        startTime +
        "~";

      item.id =
        "history-" +
        historyCount;

      item.addEventListener(
        "click",
        () => {

          editingItem = item;

          timeEditInput.value =
            item.textContent;

          timeEditArea.style.display =
            "flex";

          timeEditInput.focus();
        }
      );

      historyElement.appendChild(
        item
      );
    }

    function endTimeRecord() {

      if (!initialized) {
        return;
      }

      if (startTime === null) {
        return;
      }

      const endTime =
        getCurrentTime();

      const item =
        document.getElementById(
          "history-" +
          historyCount
        );

      if (item) {

        item.textContent =
          item.textContent +
          endTime;
      }

      startTime = null;
    }

    function openEditor() {

      inputArea.style.display =
        "flex";

      textInput.value =
        topText.textContent;

      textInput.focus();
    }

    function closeEditor() {

      const text =
        textInput.value.trim();

      if (text === "") {
        return;
      }

      topText.textContent =
        text;

      inputArea.style.display =
        "none";

      initialized = true;
    }

    function closeTimeEditor() {

      if (
        editingItem === null
      ) {
        return;
      }

      editingItem.textContent =
        timeEditInput.value;

      timeEditArea.style.display =
        "none";

      editingItem = null;
    }

    submitButton.addEventListener(

      "click",

      closeEditor
    );

    textInput.addEventListener(

      "keydown",

      event => {

        if (
          event.key === "Enter"
        ) {

          closeEditor();
        }
      }
    );

    timeEditButton.addEventListener(

      "click",

      closeTimeEditor
    );

    timeEditInput.addEventListener(

      "keydown",

      event => {

        if (
          event.key === "Enter"
        ) {

          closeTimeEditor();
        }
      }
    );

    topText.addEventListener(

      "click",

      event => {

        event.stopPropagation();

        openEditor();
      }
    );

    document.body.addEventListener(

      "touchstart",

      event => {

        // 3本指 = 開始
        if (
          event.touches.length === 3
        ) {

          event.preventDefault();

          startTimeRecord();
        }

        // 4本指 = 終了
        if (
          event.touches.length === 4
        ) {

          event.preventDefault();

          endTimeRecord();
        }
      },

      { passive: false }
    );

    // Service Worker 登録
    if ("serviceWorker" in navigator) {

      navigator
        .serviceWorker
        .register("./sw.js");
    }

  </script>

</body>
</html>
