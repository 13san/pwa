<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no,
    viewport-fit=cover
  "
/>

<title>路上ノート</title>

<link
  rel="manifest"
  href="manifest.json"
/>

<meta
  name="theme-color"
  content="#000000"
/>

<meta
  name="apple-mobile-web-app-capable"
  content="yes"
/>

<meta
  name="apple-mobile-web-app-status-bar-style"
  content="black-translucent"
/>

<style>

html,
body {

  margin: 0;

  width: 100%;
  height: 100%;

  background: #000;
  color: #fff;

  overflow: hidden;

  font-family:
    "Noto Sans JP",
    sans-serif;

  -webkit-user-select: none;
  user-select: none;

  touch-action: manipulation;
}

body {

  position: fixed;

  inset: 0;

  display: flex;
  flex-direction: column;
}

#captureArea {

  width: 100%;

  height: 100vh;

  display: flex;
  flex-direction: column;

  box-sizing: border-box;

  overflow-y: auto;
  overflow-x: hidden;

  -webkit-overflow-scrolling: touch;

  padding-bottom: 160px;
}

#topArea {

  position: relative;

  width: 100%;

  min-height: 72px;

  padding-top: 40px;

  box-sizing: border-box;
}

#dateText {

  position: absolute;

  left: 16px;
  top: 48px;

  font-size: 0.95rem;

  display: none;
}

#topText {

  width: 100%;

  text-align: center;

  font-size: 1.45rem;

  padding:
    0
    90px
    0
    90px;

  box-sizing: border-box;

  word-break: break-word;

  white-space: normal;

  line-height: 1.3;

  cursor: pointer;
}

#weatherInput {

  position: absolute;

  right: 16px;
  top: 48px;

  width: 70px;

  background: transparent;

  color: white;

  border: none;

  border-bottom:
    1px solid #666;

  text-align: right;

  outline: none;

  font-size: 0.95rem;

  display: none;
}

#subArea {

  position: relative;

  width: 100%;

  min-height: 32px;

  margin-top: 2px;
}

#teamName {

  width: 100%;

  text-align: center;

  font-size: 1rem;

  opacity: 0.9;

  cursor: pointer;

  display: none;

  word-break: break-word;

  padding:
    0
    20px;

  box-sizing: border-box;
}

#middleM {

  position: absolute;

  right: 25px;
  top: 3;

  font-size: 1rem;

  font-style: italic;

  opacity: 0;

  transition: opacity 0.2s;

  display: none;
}

#history {

  flex: 1;

  overflow: visible;

  padding-left: 20px;
  padding-right: 20px;

  box-sizing: border-box;
}

.historyRow {

  width: 100%;

  display: flex;

  justify-content: space-between;

  align-items: center;

  margin-top: 4px;

  gap: 10px;
}

.historyItem {

  flex: 1;

  font-size: 1.27rem;

  line-height: 1.2;

  word-break: break-word;

  white-space: normal;

  cursor: pointer;
}

.peopleCount {

  width: 42px;

  flex-shrink: 0;

  background: transparent;

  color: white;

  border: none;

  border-bottom:
    1px solid #666;

  outline: none;

  text-align: center;

  font-size: 0.9rem;

  padding: 0;
}

#bottomArea {

  position: fixed;

  left: 0;
  bottom: 0;

  width: 100%;

  background: #000;

  z-index: 1000;

  padding-bottom:
    env(safe-area-inset-bottom);

  border-top:
    1px solid #222;
}

#memoDisplay {

  width: calc(100% - 40px);

  min-height: 90px;

  margin:
    8px
    20px
    0
    20px;

  background: #111;

  color: white;

  border:
    1px solid #333;

  border-radius: 8px;

  padding: 8px;

  box-sizing: border-box;

  font-size: 0.95rem;

  line-height: 1.4;

  white-space: pre-wrap;

  word-break: break-word;

  overflow-wrap: break-word;
}

#memoArea {

  position: absolute;

  left: -99999px;

  opacity: 0;
}

#saveImageButton {

  width: calc(100% - 40px);

  margin:
    4px
    20px
    6px
    20px;

  padding: 8px;

  background: #222;

  color: white;

  border:
    1px solid #444;

  border-radius: 8px;

  font-size: 1rem;
}

#inputArea,
#teamInputArea,
#timeEditArea,
#confirmArea {

  position: fixed;

  left: 50%;
  top: 50%;

  transform:
    translate(-50%, -50%);

  width: 80%;
  max-width: 400px;

  display: flex;
  flex-direction: column;

  gap: 8px;

  background: #111;

  border:
    1px solid #444;

  padding: 18px;

  box-sizing: border-box;

  z-index: 9999;
}

input,
button,
textarea {

  font-size: 1rem;

  padding: 8px;

  box-sizing: border-box;
}

input,
textarea {

  border: none;

  outline: none;
}

button {

  background: #444;

  color: white;

  border: none;
}

.buttonRow {

  display: flex;

  gap: 8px;
}

.buttonRow button {

  flex: 1;
}

</style>

</head>

<body>

<div id="captureArea">

  <div id="topArea">

    <div id="dateText"></div>

    <div id="topText"></div>

    <input
      id="weatherInput"
      type="text"
      placeholder="天気"
    />

  </div>

  <div id="subArea">

    <div id="teamName">
      (猿一番)
    </div>

    <div id="middleM">
      M
    </div>

  </div>

  <div id="history"></div>

</div>

<div id="bottomArea">

  <div
    id="memoDisplay"
    contenteditable="true"
    spellcheck="false"
  ></div>

  <textarea
    id="memoArea"
  ></textarea>

  <button id="saveImageButton">
    写真
  </button>

</div>

<div id="inputArea">

  <input
    id="textInput"
    type="text"
    placeholder="現場名を入力!"
  />

  <button id="submitButton">
    決定
  </button>

</div>

<div
  id="teamInputArea"
  style="display:none;"
>

  <input
    id="teamInput"
    type="text"
    placeholder="コンビ名"
  />

  <button id="teamSubmitButton">
    決定
  </button>

</div>

<div
  id="timeEditArea"
  style="display:none;"
>

  <input
    id="timeEditInput"
    type="text"
  />

  <div class="buttonRow">

    <button id="timeEditButton">
      修正
    </button>

    <button id="deleteButton">
      削除
    </button>

  </div>

</div>

<div
  id="confirmArea"
  style="display:none;"
>

  <div>
    本当に削除しますか？
  </div>

  <div class="buttonRow">

    <button id="confirmDeleteButton">
      消す
    </button>

    <button id="cancelDeleteButton">
      残す
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const captureArea =
  document.getElementById(
    "captureArea"
  );

const topText =
  document.getElementById(
    "topText"
  );

const teamName =
  document.getElementById(
    "teamName"
  );

const middleM =
  document.getElementById(
    "middleM"
  );

const weatherInput =
  document.getElementById(
    "weatherInput"
  );

const historyElement =
  document.getElementById(
    "history"
  );

const memoArea =
  document.getElementById(
    "memoArea"
  );

const memoDisplay =
  document.getElementById(
    "memoDisplay"
  );

const saveImageButton =
  document.getElementById(
    "saveImageButton"
  );

const dateText =
  document.getElementById(
    "dateText"
  );

const inputArea =
  document.getElementById(
    "inputArea"
  );

const textInput =
  document.getElementById(
    "textInput"
  );

const submitButton =
  document.getElementById(
    "submitButton"
  );

const teamInputArea =
  document.getElementById(
    "teamInputArea"
  );

const teamInput =
  document.getElementById(
    "teamInput"
  );

const teamSubmitButton =
  document.getElementById(
    "teamSubmitButton"
  );

const timeEditArea =
  document.getElementById(
    "timeEditArea"
  );

const timeEditInput =
  document.getElementById(
    "timeEditInput"
  );

const timeEditButton =
  document.getElementById(
    "timeEditButton"
  );

const deleteButton =
  document.getElementById(
    "deleteButton"
  );

const confirmArea =
  document.getElementById(
    "confirmArea"
  );

const confirmDeleteButton =
  document.getElementById(
    "confirmDeleteButton"
  );

const cancelDeleteButton =
  document.getElementById(
    "cancelDeleteButton"
  );

let initialized =
  false;

let startTime =
  null;

let historyCount =
  0;

let editingItem =
  null;

let touchTimer =
  null;

const TOUCH_DELAY =
  20;

const weekNames = [
  "日",
  "月",
  "火",
  "水",
  "木",
  "金",
  "土"
];

const numbers = [
"①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳","㉑","㉒","㉓","㉔","㉕","㉖","㉗","㉘","㉙","㉚","㉛","㉜","㉝","㉞","㉟","㊱","㊲","㊳","㊴","㊵","㊶","㊷","㊸","㊹","㊺","㊻","㊼","㊽","㊾","㊿"
];

function syncMemo() {

  memoArea.value =
    memoDisplay.innerText;
}

memoDisplay.addEventListener(
  "input",
  syncMemo
);

function updateDate() {

  const now =
    new Date();

  const y =
    now.getFullYear();

  const m =
    String(
      now.getMonth() + 1
    ).padStart(2, "0");

  const d =
    String(
      now.getDate()
    ).padStart(2, "0");

  const w =
    weekNames[
      now.getDay()
    ];

  dateText.textContent =
    `${y}/${m}/${d}(${w})`;
}

updateDate();

function getNumberText(index) {

  if (
    index < numbers.length
  ) {

    return numbers[index];
  }

  return (index + 1) + ".";
}

function getRoundedTime() {

  const now =
    new Date();

  let h =
    now.getHours();

  let m =
    now.getMinutes();

  const s =
    now.getSeconds();

  if (
    s >= 30
  ) {

    m++;

    if (
      m >= 60
    ) {

      m = 0;

      h++;

      if (
        h >= 24
      ) {
        h = 0;
      }
    }
  }

  return (

    String(h)
      .padStart(2, "0")

    + ":"

    +

    String(m)
      .padStart(2, "0")
  );
}

function updateAllNumbers() {

  const rows =
    document.querySelectorAll(
      ".historyRow"
    );

  rows.forEach(
    (row, index) => {

      const item =
        row.querySelector(
          ".historyItem"
        );

      item.textContent =

        getNumberText(index)

        +

        item.textContent.substring(1);
    }
  );

  historyCount =
    rows.length;
}

function createHistoryRow(text) {

  const row =
    document.createElement(
      "div"
    );

  row.className =
    "historyRow";

  const item =
    document.createElement(
      "div"
    );

  item.className =
    "historyItem";

  item.textContent =
    text;

  item.addEventListener(
    "click",
    () => {

      editingItem =
        item;

      timeEditInput.value =
        item.textContent;

      timeEditArea.style.display =
        "flex";
    }
  );

  const people =
    document.createElement(
      "input"
    );

  people.className =
    "peopleCount";

  people.type =
    "number";

  people.placeholder =
    "人数";

  row.appendChild(item);

  row.appendChild(people);

  historyElement.appendChild(
    row
  );
}

function enableMiddleM() {

  middleM.style.display =
    "block";

  middleM.style.opacity =
    "0.9";
}

function startTimeRecord() {

  if (
    !initialized
  ) {
    return;
  }

  if (
    startTime !== null
  ) {
    return;
  }

  startTime =
    getRoundedTime();

  historyCount++;

  createHistoryRow(

    getNumberText(
      historyCount - 1
    )

    +

    startTime

    +

    "~"
  );

  enableMiddleM();
}

function endTimeRecord() {

  if (
    !initialized
  ) {
    return;
  }

  if (
    startTime === null
  ) {
    return;
  }

  const items =
    document.querySelectorAll(
      ".historyItem"
    );

  const item =
    items[
      items.length - 1
    ];

  if (
    item &&
    item.textContent.endsWith("~")
  ) {

    item.textContent +=
      getRoundedTime();
  }

  startTime =
    null;
}

function closeEditor() {

  const text =
    textInput.value.trim();

  if (
    text === ""
  ) {
    return;
  }

  topText.textContent =
    text;

  weatherInput.style.display =
    "block";

  teamName.style.display =
    "block";

  dateText.style.display =
    "block";

  inputArea.style.display =
    "none";

  initialized =
    true;
}

function closeTeamEditor() {

  const text =
    teamInput.value.trim();

  if (
    text !== ""
  ) {

    teamName.textContent =
      "(" + text + ")";
  }

  teamInputArea.style.display =
    "none";
}

function closeTimeEditor() {

  if (
    editingItem === null
  ) {
    return;
  }

  editingItem.textContent =
    timeEditInput.value;

  editingItem =
    null;

  timeEditArea.style.display =
    "none";

  updateAllNumbers();
}

function openDeleteConfirm() {

  timeEditArea.style.display =
    "none";

  confirmArea.style.display =
    "flex";
}

function confirmDelete() {

  if (
    editingItem === null
  ) {
    return;
  }

  const row =
    editingItem.closest(
      ".historyRow"
    );

  if (row) {

    row.remove();
  }

  editingItem =
    null;

  confirmArea.style.display =
    "none";

  updateAllNumbers();
}

function cancelDelete() {

  confirmArea.style.display =
    "none";

  editingItem =
    null;
}

submitButton.addEventListener(
  "click",
  closeEditor
);

teamSubmitButton.addEventListener(
  "click",
  closeTeamEditor
);

topText.addEventListener(
  "click",
  () => {

    inputArea.style.display =
      "flex";

    textInput.value =
      topText.textContent;
  }
);

teamName.addEventListener(
  "click",
  () => {

    teamInputArea.style.display =
      "flex";
  }
);

timeEditButton.addEventListener(
  "click",
  closeTimeEditor
);

deleteButton.addEventListener(
  "click",
  openDeleteConfirm
);

confirmDeleteButton.addEventListener(
  "click",
  confirmDelete
);

cancelDeleteButton.addEventListener(
  "click",
  cancelDelete
);

document.body.addEventListener(

  "touchstart",

  event => {

    clearTimeout(
      touchTimer
    );

    const count =
      event.touches.length;

    touchTimer =
      setTimeout(() => {

        if (
          count === 2
        ) {

          event.preventDefault();

          startTimeRecord();
        }

        if (
          count === 3
        ) {

          event.preventDefault();

          endTimeRecord();
        }

      }, TOUCH_DELAY);
  },

  { passive: false }
);

document.addEventListener(

  "keydown",

  event => {

    if (
      event.key ===
      "AudioVolumeUp"
    ) {

      startTimeRecord();
    }

    if (
      event.key ===
      "AudioVolumeDown"
    ) {

      endTimeRecord();
    }
  }
);

saveImageButton.addEventListener(

  "click",

  async () => {

    saveImageButton.style.visibility =
      "hidden";

    const exportRoot =
      document.createElement("div");

    exportRoot.style.background =
      "#000";

    exportRoot.style.color =
      "#fff";

    exportRoot.style.width =
      captureArea.scrollWidth + "px";

    exportRoot.style.paddingBottom =
      "0px";

    exportRoot.style.boxSizing =
      "border-box";

    const captureClone =
      captureArea.cloneNode(true);

    captureClone.style.height =
      "auto";

    captureClone.style.overflow =
      "visible";

    captureClone.style.paddingBottom =
      "0px";

    const memoClone =
      memoDisplay.cloneNode(true);

    memoClone.style.marginTop =
      "2px";

    memoClone.style.marginBottom =
      "0px";

    exportRoot.appendChild(
      captureClone
    );

    exportRoot.appendChild(
      memoClone
    );

    const hidden =
      document.createElement("div");

    hidden.style.position =
      "fixed";

    hidden.style.left =
      "-99999px";

    hidden.style.top =
      "0";

    hidden.appendChild(
      exportRoot
    );

    document.body.appendChild(
      hidden
    );

    await new Promise(
      resolve =>
        requestAnimationFrame(
          resolve
        )
    );

    const canvas =
      await html2canvas(
        exportRoot,
        {
          backgroundColor:
            "#000",

          useCORS: true,

          scrollX: 0,
          scrollY: 0,

          windowWidth:
            exportRoot.scrollWidth,

          windowHeight:
            exportRoot.scrollHeight
        }
      );

    hidden.remove();

    saveImageButton.style.visibility =
      "visible";

    canvas.toBlob(

      async blob => {

        const file =
          new File(
            [blob],
            "record.png",
            {
              type:
                "image/png"
            }
          );

        if (
          navigator.canShare &&
          navigator.canShare({
            files: [file]
          })
        ) {

          await navigator.share({

            files: [file],

            title:
              "record"
          });

          return;
        }

        const link =
          document.createElement(
            "a"
          );

        link.href =
          URL.createObjectURL(
            blob
          );

        link.download =
          "record.png";

        link.click();
      }
    );
  }
);

document.addEventListener(
  "gesturestart",
  event => {
    event.preventDefault();
  },
  { passive: false }
);

document.addEventListener(
  "gesturechange",
  event => {
    event.preventDefault();
  },
  { passive: false }
);

document.addEventListener(
  "gestureend",
  event => {
    event.preventDefault();
  },
  { passive: false }
);

let lastTouchEnd = 0;

document.addEventListener(
  "touchend",
  event => {

    const now = Date.now();

    if (
      now - lastTouchEnd <= 300
    ) {
      event.preventDefault();
    }

    lastTouchEnd = now;
  },
  { passive: false }
);

if (
  "serviceWorker"
  in navigator
) {

  navigator
    .serviceWorker
    .register("./sw.js");
}

</script>

</body>
</html>
