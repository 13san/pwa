<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Current Time</title>

  <link
    rel="manifest"
    href="manifest.json"
  />

  <meta
    name="theme-color"
    content="#000000"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <style>

    body {

      margin: 0;

      width: 100vw;
      height: 100vh;

      background: #000;
      color: #fff;

      font-family:
        "Noto Sans JP",
        sans-serif;

      overflow: hidden;

      user-select: none;
      -webkit-user-select: none;

      display: flex;
      flex-direction: column;

      align-items: center;
    }

    #topText {

      width: 100%;

      text-align: center;

      font-size: 2rem;

      padding-top: 30px;

      word-break: break-word;

      cursor: pointer;
    }

    #middleM {

      width: 100%;

      text-align: right;

      padding-right: 25px;

      box-sizing: border-box;

      font-size: 1.6rem;

      font-style: italic;

      margin-top: -5px;
      margin-bottom: 15px;

      opacity: 0;

      transition: opacity 0.2s;

      pointer-events: none;
    }

    #history {

      width: 100%;

      flex: 1;

      overflow-y: auto;

      display: flex;
      flex-direction: column;

      align-items: flex-start;

      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 30px;

      box-sizing: border-box;
    }

    .historyRow {

      width: 100%;

      display: flex;

      align-items: center;

      justify-content: space-between;

      margin-top: 10px;
    }

    .historyItem {

      font-size: 1rem;

      white-space: nowrap;

      cursor: pointer;
    }

    .peopleCount {

      font-size: 1rem;

      cursor: pointer;

      min-width: 50px;

      text-align: right;
    }

    #inputArea,
    #timeEditArea {

      position: absolute;

      top: 60%;
      left: 50%;

      transform: translate(-50%, -50%);

      display: flex;
      flex-direction: column;

      gap: 10px;

      width: 80%;
      max-width: 400px;

      background: #111;

      padding: 20px;

      border: 1px solid #444;

      box-sizing: border-box;
    }

    input {

      font-size: 1.2rem;

      padding: 10px;

      border: none;

      outline: none;
    }

    button {

      font-size: 1.1rem;

      padding: 10px;

      border: none;

      background: #444;

      color: #fff;
    }

    .buttonRow {

      display: flex;

      gap: 10px;
    }

    .buttonRow button {

      flex: 1;
    }

  </style>

</head>

<body>

  <div id="topText"></div>

  <div id="middleM">
    M
  </div>

  <div id="history"></div>

  <div id="inputArea">

    <input
      id="textInput"
      type="text"
      placeholder="文字を入力"
    />

    <button id="submitButton">
      決定
    </button>

  </div>

  <div
    id="timeEditArea"
    style="display:none;"
  >

    <input
      id="timeEditInput"
      type="text"
    />

    <div class="buttonRow">

      <button id="timeEditButton">
        修正
      </button>

      <button id="deleteButton">
        削除
      </button>

    </div>

  </div>

  <script>

    const topText =
      document.getElementById(
        "topText"
      );

    const middleM =
      document.getElementById(
        "middleM"
      );

    const historyElement =
      document.getElementById(
        "history"
      );

    const inputArea =
      document.getElementById(
        "inputArea"
      );

    const textInput =
      document.getElementById(
        "textInput"
      );

    const submitButton =
      document.getElementById(
        "submitButton"
      );

    const timeEditArea =
      document.getElementById(
        "timeEditArea"
      );

    const timeEditInput =
      document.getElementById(
        "timeEditInput"
      );

    const timeEditButton =
      document.getElementById(
        "timeEditButton"
      );

    const deleteButton =
      document.getElementById(
        "deleteButton"
      );

    let initialized = false;

    let startTime = null;

    let historyCount = 0;

    let editingItem = null;

    let touchTimer = null;

    const TOUCH_DELAY = 20;

    const numbers = [

      "①","②","③","④","⑤",
      "⑥","⑦","⑧","⑨","⑩",

      "⑪","⑫","⑬","⑭","⑮",
      "⑯","⑰","⑱","⑲","⑳",

      "㉑","㉒","㉓","㉔","㉕",
      "㉖","㉗","㉘","㉙","㉚",

      "㉛","㉜","㉝","㉞","㉟",

      "㊱","㊲","㊳","㊴","㊵",

      "㊶","㊷","㊸","㊹","㊺",
      "㊻","㊼","㊽","㊾","㊿"
    ];

    function getNumberText(index) {

      if (index < numbers.length) {

        return numbers[index];
      }

      return (index + 1) + ".";
    }

    function getCurrentTime() {

      const now = new Date();

      return (

        now
          .getHours()
          .toString()
          .padStart(2, "0")

        + ":"

        +

        now
          .getMinutes()
          .toString()
          .padStart(2, "0")

        + ":"

        +

        now
          .getSeconds()
          .toString()
          .padStart(2, "0")
      );
    }

    function updateAllNumbers() {

      const rows =
        document.querySelectorAll(
          ".historyRow"
        );

      rows.forEach(
        (row, index) => {

          const item =
            row.querySelector(
              ".historyItem"
            );

          const text =
            item.textContent;

          item.textContent =

            getNumberText(index)

            +

            text.substring(1);
        }
      );

      historyCount =
        rows.length;
    }

    function enableMiddleM() {

      middleM.style.opacity =
        "0.9";
    }

    function createHistoryRow(text) {

      const row =
        document.createElement(
          "div"
        );

      row.className =
        "historyRow";

      const item =
        document.createElement(
          "div"
        );

      item.className =
        "historyItem";

      item.textContent =
        text;

      item.addEventListener(
        "click",
        () => {

          editingItem = item;

          timeEditInput.value =
            item.textContent;

          timeEditArea.style.display =
            "flex";

          timeEditInput.focus();
        }
      );

      const people =
        document.createElement(
          "input"
        );

      people.className =
        "peopleCount";

      people.type = "number";

      people.placeholder = "[人数]";

      people.inputMode =
        "numeric";

      row.appendChild(item);

      row.appendChild(people);

      historyElement.appendChild(
        row
      );
    }

    function startTimeRecord() {

      if (!initialized) {
        return;
      }

      if (startTime !== null) {
        return;
      }

      startTime =
        getCurrentTime();

      historyCount++;

      const text =

        getNumberText(
          historyCount - 1
        )

        +

        startTime

        +

        "~";

      createHistoryRow(text);

      enableMiddleM();
    }

    function endTimeRecord() {

      if (!initialized) {
        return;
      }

      if (startTime === null) {
        return;
      }

      const items =
        document.querySelectorAll(
          ".historyItem"
        );

      const item =
        items[
          items.length - 1
        ];

      if (!item) {
        return;
      }

      if (
        item.textContent.endsWith("~")
      ) {

        item.textContent +=
          getCurrentTime();
      }

      startTime = null;
    }

    function openEditor() {

      inputArea.style.display =
        "flex";

      textInput.value =
        topText.textContent;

      textInput.focus();
    }

    function closeEditor() {

      const text =
        textInput.value.trim();

      if (text === "") {
        return;
      }

      topText.textContent =
        text;

      inputArea.style.display =
        "none";

      initialized = true;
    }

    function closeTimeEditor() {

      if (
        editingItem === null
      ) {
        return;
      }

      const currentText =
        editingItem.textContent;

      const fixedText =

        currentText.charAt(0)

        +

        timeEditInput.value.substring(1);

      editingItem.textContent =
        fixedText;

      timeEditArea.style.display =
        "none";

      editingItem = null;

      updateAllNumbers();
    }

    function deleteTimeItem() {

      if (
        editingItem === null
      ) {
        return;
      }

      const row =
        editingItem.closest(
          ".historyRow"
        );

      if (row) {

        row.remove();
      }

      editingItem = null;

      timeEditArea.style.display =
        "none";

      updateAllNumbers();

      if (
        historyElement.children
          .length === 0
      ) {

        middleM.style.opacity =
          "0";
      }
    }

    submitButton.addEventListener(

      "click",

      closeEditor
    );

    textInput.addEventListener(

      "keydown",

      event => {

        if (
          event.key === "Enter"
        ) {

          closeEditor();
        }
      }
    );

    timeEditButton.addEventListener(

      "click",

      closeTimeEditor
    );

    deleteButton.addEventListener(

      "click",

      deleteTimeItem
    );

    timeEditInput.addEventListener(

      "keydown",

      event => {

        if (
          event.key === "Enter"
        ) {

          closeTimeEditor();
        }
      }
    );

    topText.addEventListener(

      "click",

      event => {

        event.stopPropagation();

        openEditor();
      }
    );

    document.body.addEventListener(

      "touchstart",

      event => {

        clearTimeout(
          touchTimer
        );

        const touchCount =
          event.touches.length;

        touchTimer =
          setTimeout(() => {

            if (
              touchCount === 3
            ) {

              event.preventDefault();

              startTimeRecord();
            }

            if (
              touchCount === 4
            ) {

              event.preventDefault();

              endTimeRecord();
            }

          }, TOUCH_DELAY);
      },

      { passive: false }
    );

    document.body.addEventListener(

      "touchend",

      () => {

        clearTimeout(
          touchTimer
        );
      }
    );

    if ("serviceWorker" in navigator) {

      navigator
        .serviceWorker
        .register("./sw.js");
    }

  </script>

</body>
</html>
